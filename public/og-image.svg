<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D4B3B"/>
  
  <!-- Subtle dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Large pill decoration top-right -->
  <rect x="820" y="80" width="320" height="110" rx="55" fill="white" opacity="0.06"/>
  <rect x="820" y="80" width="160" height="110" rx="55" fill="white" opacity="0.04"/>
  
  <!-- Large pill decoration bottom-left -->
  <rect x="60" y="430" width="280" height="90" rx="45" fill="white" opacity="0.05"/>
  
  <!-- Logo icon container -->
  <rect x="80" y="80" width="90" height="90" rx="20" fill="white" opacity="0.15"/>
  
  <!-- Logo pill inside icon -->
  <rect x="92" y="108" width="66" height="34" rx="17" fill="white" opacity="0.3"/>
  <rect x="92" y="108" width="33" height="34" rx="17" fill="white" opacity="0.7"/>
  <line x1="125" y1="108" x2="125" y2="142" stroke="#0D4B3B" stroke-width="2" opacity="0.4"/>
  <!-- Plus above -->
  <line x1="125" y1="90" x2="125" y2="104" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="118" y1="97" x2="132" y2="97" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Dots -->
  <circle cx="110" cy="155" r="4" fill="white" opacity="0.5"/>
  <circle cx="125" cy="158" r="4" fill="white" opacity="0.5"/>
  <circle cx="140" cy="155" r="4" fill="white" opacity="0.5"/>

  <!-- VeriMat text -->
  <text x="188" y="140" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">VeriMat</text>
  
  <!-- Tagline -->
  <text x="80" y="230" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="white" opacity="0.95">Stop bahan baku salah</text>
  <text x="80" y="285" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="white" opacity="0.95">sebelum masuk gudang.</text>
  
  <!-- Description -->
  <text x="80" y="360" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="white" opacity="0.7">Verifikasi otomatis dokumen penerimaan bahan baku farmasi</text>
  <text x="80" y="395" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="white" opacity="0.7">dengan Azure AI. PASS / MISMATCH / INCOMPLETE dalam &lt; 30 detik.</text>
  
  <!-- Badge -->
  <rect x="80" y="460" width="340" height="52" rx="26" fill="white" opacity="0.15"/>
  <text x="250" y="491" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="white" opacity="0.9" text-anchor="middle">Sesuai Standar CPOB · PerBPOM No. 7/2025</text>
  
  <!-- Azure badge -->
  <rect x="444" y="460" width="220" height="52" rx="26" fill="white" opacity="0.15"/>
  <text x="554" y="491" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="white" opacity="0.9" text-anchor="middle">Powered by Azure AI</text>
  
  <!-- URL -->
  <text x="80" y="580" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="white" opacity="0.5">verimat.vercel.app</text>
  
  <!-- Decorative right element -->
  <rect x="950" y="280" width="200" height="200" rx="30" fill="white" opacity="0.05"/>
  <rect x="975" y="330" width="150" height="50" rx="25" fill="white" opacity="0.1"/>
  <rect x="975" y="330" width="75" height="50" rx="25" fill="white" opacity="0.1"/>
  <text x="1000" y="430" font-family="Arial" font-size="48" fill="white" opacity="0.15">✓</text>
</svg>
