<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0D4B3B"/>
  
  <!-- Pill shape - left half (darker) -->
  <rect x="4" y="12" width="12" height="8" rx="4" fill="white" opacity="0.9"/>
  <!-- Pill shape - right half (lighter) -->
  <rect x="16" y="12" width="12" height="8" rx="4" fill="white" opacity="0.4"/>
  <!-- Dividing line -->
  <line x1="16" y1="12" x2="16" y2="20" stroke="#0D4B3B" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Plus/cross above pill -->
  <line x1="16" y1="5" x2="16" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="13.5" y1="7.5" x2="18.5" y2="7.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Dots below -->
  <circle cx="11" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="16" cy="26" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="21" cy="25" r="1.5" fill="white" opacity="0.7"/>
</svg>
